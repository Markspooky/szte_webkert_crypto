<div class="home-container">
  <h2>Piaci áttekintés</h2>
  
  <mat-card>
    <table mat-table [dataSource]="dataSource">
      
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Név </th>
        <td mat-cell *matCellDef="let coin">
          <strong>{{coin.name}}</strong> <span class="symbol">({{coin.symbol}})</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef> Árfolyam (USD) </th>
        <td mat-cell *matCellDef="let coin"> ${{coin.price | number:'1.2-2'}} </td>
      </ng-container>

      <ng-container matColumnDef="change">
        <th mat-header-cell *matHeaderCellDef> 24ó Változás </th>
        <td mat-cell *matCellDef="let coin" [ngClass]="{'positive': coin.change24h > 0, 'negative': coin.change24h < 0}">
          <mat-icon inline="true">{{ coin.change24h > 0 ? 'trending_up' : 'trending_down' }}</mat-icon>
          {{coin.change24h}}%
        </td>
      </ng-container>

      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let coin">
          <a mat-button color="primary" [routerLink]="['/coin', coin.id]">Részletek</a>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card>
</div>
