<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Bejelentkezés</mat-card-title>
      <mat-card-subtitle>Lépj be a portfóliód eléréséhez</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form class="login-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email cím</mat-label>
          <input matInput type="email" placeholder="pelda@szte.hu">
          <mat-icon matSuffix>email</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Jelszó</mat-label>
          <input matInput type="password">
          <mat-icon matSuffix>lock</mat-icon>
        </mat-form-field>

        <button mat-flat-button color="primary" class="full-width login-btn" routerLink="/home">
          Belépés
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
