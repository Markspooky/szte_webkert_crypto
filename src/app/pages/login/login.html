<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Bejelentkezés</mat-card-title>
      <mat-card-subtitle>Lépj be a portfóliód eléréséhez</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="login-actions">
      <button mat-stroked-button color="primary" class="full-width login-btn" (click)="loginWithGoogle()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google logo" class="google-logo">
        Belépés Google fiókkal
      </button>
    </mat-card-content>
  </mat-card>
</div>
