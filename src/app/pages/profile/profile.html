<div class="profile-container">

  @if (user$ | async; as user) {
    <mat-card class="profile-card">
      <mat-card-header>
        @if (user.photoURL) {
          <img mat-card-avatar [src]="user.photoURL" alt="Profilkép">
        } @else {
          <div mat-card-avatar class="user-avatar"><mat-icon>person</mat-icon></div>
        }
        <mat-card-title>{{ user.displayName || 'Névtelen Felhasználó' }}</mat-card-title>
        <mat-card-subtitle>{{ user.email }}</mat-card-subtitle>
      </mat-card-header>
      
      <mat-card-content class="settings-content">
        <h3>Beállítások</h3>
        <div class="setting-item">
        <span><mat-icon inline="true">dark_mode</mat-icon> Sötét téma</span>
        <mat-slide-toggle color="primary" [checked]="isDarkMode" (change)="toggleDarkMode($event)"></mat-slide-toggle>
      </div>
      </mat-card-content>
  
      <mat-card-actions align="end">
        <button mat-button color="warn" (click)="logout()"><mat-icon>logout</mat-icon> Kijelentkezés</button>
      </mat-card-actions>
    </mat-card>
  }
  
  @else {
    <mat-card class="empty-state">
      <mat-icon color="primary">lock</mat-icon>
      <h2>Jelentkezz be az adatokhoz!</h2>
      <p>A profilod megtekintéséhez kérlek lépj be a fiókodba.</p>
      <button mat-raised-button color="primary" routerLink="/login">Irány a belépés</button>
    </mat-card>
  }

</div>
