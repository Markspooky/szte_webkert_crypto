<mat-sidenav-container class="sidenav-container" style="height: 100vh;">
  <mat-sidenav #drawer mode="side" opened="true" style="width: 250px;">
    <mat-toolbar color="primary">CryptoTracker</mat-toolbar>
    <mat-nav-list>
      <a mat-list-item routerLink="/home">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <div matListItemTitle>Főoldal</div>
      </a>
      <a mat-list-item routerLink="/portfolio">
        <mat-icon matListItemIcon>account_balance_wallet</mat-icon>
        <div matListItemTitle>Portfólió</div>
      </a>
      <a mat-list-item routerLink="/profile">
        <mat-icon matListItemIcon>person</mat-icon>
        <div matListItemTitle>Profil</div>
      </a>
      <a mat-list-item routerLink="/login">
        <mat-icon matListItemIcon>login</mat-icon>
        <div matListItemTitle>Belépés</div>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar>
      <button mat-icon-button (click)="drawer.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
      <span>1. Mérföldkő Demó</span>
    </mat-toolbar>
    
    <main style="padding: 20px;">
      <ng-content></ng-content>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
